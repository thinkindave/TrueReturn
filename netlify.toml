[build]
  publish = "."

# ─── Redirects ───────────────────────────────────────────────────────────────

[[redirects]]
  from  = "/about"
  to    = "/about.html"
  status = 301

[[redirects]]
  from  = "/privacy"
  to    = "/privacy.html"
  status = 301

[[redirects]]
  from  = "/contact"
  to    = "/contact.html"
  status = 301

# ─── Security headers (all pages) ────────────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "DENY"

    # Prevent MIME-type sniffing
    X-Content-Type-Options = "nosniff"

    # Limit referrer information sent to third parties
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Disable browser features not used by the app
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"

    # Content Security Policy
    # Note: unsafe-inline is required because the app uses a large inline
    # <script> block and inline <style> tags (single-file architecture).
    # It still blocks external script injection from unknown origins and
    # provides object/frame/base-uri protection.
    Content-Security-Policy = """
      default-src 'none';
      script-src  'self' 'unsafe-inline' https://cdn.jsdelivr.net;
      style-src   'self' 'unsafe-inline';
      font-src    'self';
      img-src     'self' data:;
      connect-src 'none';
      frame-ancestors 'none';
      base-uri    'self';
      form-action 'self'
    """

# ─── Font caching (1 year — filenames are versioned) ─────────────────────────

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
