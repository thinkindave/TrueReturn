<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Thanks — TrueReturn</title>
  <style>
    :root {
      --color-primary-500: #10B981;
      --color-primary-600: #059669;
      --bg-body: #0B0F19;
      --bg-surface: #111827;
      --bg-elevated: #1F2937;
      --text-primary: #F9FAFB;
      --text-secondary: #9CA3AF;
      --text-muted: #6B7280;
      --border-default: #1F2937;
      --border-subtle: #374151;
      --accent: #10B981;
      --accent-hover: #059669;
      --accent-bg: rgba(16, 185, 129, 0.08);
      --accent-border: rgba(16, 185, 129, 0.20);
      --focus-ring: rgba(16, 185, 129, 0.25);
      --shadow-color: rgba(0,0,0,0.5);
      --transition-fast: 150ms ease;
      --transition-base: 200ms ease;
      --radius-sm: 8px;
      --radius-md: 12px;
    }
    [data-theme="light"] {
      --bg-body: #F3F4F6;
      --bg-surface: #FFFFFF;
      --bg-elevated: #F9FAFB;
      --text-primary: #1F2937;
      --text-secondary: #4B5563;
      --text-muted: #6B7280;
      --border-default: #E5E7EB;
      --border-subtle: #D1D5DB;
      --shadow-color: rgba(0,0,0,0.08);
      --accent-border: rgba(16, 185, 129, 0.30);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg-body);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    header {
      background: var(--bg-surface);
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border-default);
      box-shadow: 0 1px 2px var(--shadow-color);
      position: relative;
      z-index: 10;
    }
    .header-content { display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 1.375rem; font-weight: 800; letter-spacing: -0.5px; color: var(--accent); display: flex; align-items: center; }
    header p { color: var(--text-muted); font-size: 0.8125rem; margin-top: 0.125rem; }
    .header-right { display: flex; align-items: center; gap: 0.75rem; }
    .theme-toggle {
      display: flex; align-items: center; justify-content: center;
      width: 38px; height: 38px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-subtle);
      background: var(--bg-elevated);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition-base);
    }
    .theme-toggle:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-bg); box-shadow: 0 0 0 3px var(--focus-ring); }
    .theme-toggle svg { width: 18px; height: 18px; }
    .theme-icon-moon { display: none; }
    .theme-icon-sun { display: block; }
    [data-theme="light"] .theme-icon-moon { display: block; }
    [data-theme="light"] .theme-icon-sun { display: none; }
    .header-about-link { font-size: 0.8rem; color: var(--accent); text-decoration: none; transition: color var(--transition-fast); }
    .header-about-link:hover { color: var(--accent-hover); }
    .header-nav { display: flex; align-items: center; gap: 0.75rem; }
    .header-nav-toggle {
      display: none; align-items: center; justify-content: center;
      width: 38px; height: 38px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-subtle);
      background: var(--bg-elevated);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition-base);
    }
    .header-nav-toggle:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-bg); box-shadow: 0 0 0 3px var(--focus-ring); }
    @media (max-width: 540px) {
      .header-nav-toggle { display: flex; }
      .header-nav {
        display: none; position: absolute; top: 100%; left: 0; right: 0;
        flex-direction: column; align-items: stretch; gap: 0;
        background: var(--bg-surface);
        border-bottom: 1px solid var(--border-default);
        border-radius: 0 0 var(--radius-sm) var(--radius-sm);
        padding: 0.5rem 0; z-index: 100;
      }
      .header-nav.is-open { display: flex; }
      .header-nav .header-about-link { padding: 0.65rem 1.25rem; font-size: 0.875rem; border-radius: 0; }
    }
    .thankyou-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 6rem 2rem;
      max-width: 520px;
      margin: 0 auto;
    }
    .thankyou-icon {
      width: 56px; height: 56px;
      background: var(--accent-bg);
      border: 1px solid var(--accent-border);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 1.5rem;
      color: var(--accent);
    }
    .thankyou-heading {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 800;
      margin-bottom: 0.75rem;
    }
    .thankyou-body {
      font-size: 1rem;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 2rem;
    }
    .thankyou-links { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    .thankyou-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .thankyou-link:hover { text-decoration: underline; }
    .about-footer {
      text-align: center;
      padding: 2rem;
      border-top: 1px solid var(--border-default);
      color: var(--text-muted);
      font-size: 0.8rem;
    }
    .about-footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <div>
        <h1><a href="index.html" style="text-decoration:none;color:inherit"><img src="tr-logo.png" alt="TrueReturn logo" style="height:28px;width:auto;vertical-align:middle;margin-right:0.5rem;"><span style="color:var(--text-primary)">True</span>Return</a></h1>
        <p>The full investment picture</p>
      </div>
      <div class="header-right">
        <button class="header-nav-toggle" aria-label="Open navigation menu" aria-expanded="false" aria-controls="header-nav">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="2" y1="4" x2="16" y2="4"/><line x1="2" y1="9" x2="16" y2="9"/><line x1="2" y1="14" x2="16" y2="14"/></svg>
        </button>
        <nav class="header-nav" id="header-nav">
          <a href="index.html" class="header-about-link">Home</a>
          <a href="about.html" class="header-about-link">About</a>
          <a href="privacy.html" class="header-about-link">Privacy</a>
          <a href="contact.html" class="header-about-link">Contact</a>
        </nav>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
          <svg class="theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main>
    <div class="thankyou-wrapper">
      <div class="thankyou-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2 class="thankyou-heading">Thanks for reaching out</h2>
      <p class="thankyou-body">We'll get back to you shortly.</p>
      <div class="thankyou-links">
        <a href="contact.html" class="thankyou-link">← Send another message</a>
        <a href="index.html" class="thankyou-link">Open the Calculator →</a>
      </div>
    </div>
  </main>

  <footer class="about-footer">
    <p>Built for Australian property investors &nbsp;·&nbsp; Not financial advice &nbsp;·&nbsp; <a href="about.html">About</a> &nbsp;·&nbsp; <a href="privacy.html">Privacy Policy</a> &nbsp;·&nbsp; <a href="contact.html">Contact</a> &nbsp;·&nbsp; <a href="index.html">Open Calculator →</a></p>
  </footer>

  <script>
    function initTheme() {
      const toggle = document.getElementById('themeToggle');
      const html = document.documentElement;
      const saved = localStorage.getItem('truereturn-theme');
      if (saved) html.setAttribute('data-theme', saved);
      toggle.addEventListener('click', () => {
        const next = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        html.setAttribute('data-theme', next);
        localStorage.setItem('truereturn-theme', next);
      });
    }
    initTheme();

    (function initHamburger() {
      const toggle = document.querySelector('.header-nav-toggle');
      const nav = document.querySelector('.header-nav');
      if (!toggle || !nav) return;
      toggle.addEventListener('click', function(e) {
        e.stopPropagation();
        const opening = !nav.classList.contains('is-open');
        nav.classList.toggle('is-open', opening);
        toggle.setAttribute('aria-expanded', String(opening));
        toggle.setAttribute('aria-label', opening ? 'Close navigation menu' : 'Open navigation menu');
      });
      nav.addEventListener('click', function(e) {
        if (e.target.matches('a')) {
          nav.classList.remove('is-open');
          toggle.setAttribute('aria-expanded', 'false');
          toggle.setAttribute('aria-label', 'Open navigation menu');
        }
      });
      document.addEventListener('click', function(e) {
        if (!nav.contains(e.target) && !toggle.contains(e.target)) {
          nav.classList.remove('is-open');
          toggle.setAttribute('aria-expanded', 'false');
          toggle.setAttribute('aria-label', 'Open navigation menu');
        }
      });
    })();
  </script>
</body>
</html>
